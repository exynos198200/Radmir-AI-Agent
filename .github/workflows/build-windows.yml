name: Build Windows Application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Ускоряет повторные сборки backend

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pyinstaller

    - name: Build Python Backend
      run: pyinstaller --name backend-server --onefile backend/main.py

    - name: Install NPM dependencies
      run: npm ci # Строгая и быстрая установка по package-lock.json

    - name: Build React Frontend
      run: npm run build

    - name: Build Electron App
      run: npx electron-builder --win # Гарантирует запуск, даже если пакета нет глобально

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Radmir-AI-Agent-Windows
        path: dist/*.exe # Внимание: electron-builder по умолчанию собирает в /dist, а не в /release
        
